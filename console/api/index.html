<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Klarra Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --cherry: #681334;
    --eucalypt: #213530;
    --gumleaf: #E4F7D6;
    --pinksalt: #F3E3FB;
    --sky: #9CC8FC;
    --sand: #EDE8DC;
    --charcoal: #2E2E2B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--sand);
    color: var(--charcoal);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }
  header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid rgba(46,46,43,0.12);
    background: var(--eucalypt);
    color: var(--gumleaf);
  }
  header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    font-size: 30px;
    letter-spacing: 0.3px;
    line-height: 1;
  }
  header p { font-size: 12.5px; opacity: 0.75; margin-top: 4px; }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { display: flex; flex-direction: column; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.klarra { align-self: flex-start; align-items: flex-start; }
  .who {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.5;
    margin-bottom: 4px;
  }
  .bubble {
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .user .bubble { background: var(--cherry); color: #fff; border-bottom-right-radius: 4px; }
  .klarra .bubble { background: #fff; border: 1px solid rgba(46,46,43,0.1); border-bottom-left-radius: 4px; }
  .klarra .bubble.thinking { opacity: 0.55; font-style: italic; }
  footer {
    border-top: 1px solid rgba(46,46,43,0.12);
    padding: 14px 22px;
    background: var(--sand);
  }
  form { display: flex; gap: 10px; max-width: 760px; margin: 0 auto; }
  #q {
    flex: 1;
    padding: 12px 15px;
    border: 1px solid rgba(46,46,43,0.2);
    border-radius: 12px;
    font: inherit;
    font-size: 15px;
    background: #fff;
    color: var(--charcoal);
  }
  #q:focus { outline: 2px solid var(--sky); outline-offset: 0; border-color: transparent; }
  button {
    padding: 0 20px;
    border: none;
    border-radius: 12px;
    background: var(--cherry);
    color: #fff;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.4; cursor: default; }
  .hint { max-width: 760px; margin: 8px auto 0; font-size: 11.5px; opacity: 0.5; }
</style>
</head>
<body>
  <header>
    <h1>Klarra</h1>
    <p>Ask about carers, shifts, availability and facilities.</p>
  </header>
  <div id="log"></div>
  <footer>
    <form id="f">
      <input id="q" autocomplete="off" placeholder="Who's free Sunday morning at Williamstown?" />
      <button id="send" type="submit">Ask</button>
    </form>
    <div class="hint">Read-only. Klarra can see data but can't change anything.</div>
  </footer>

<script>
  const log = document.getElementById('log');
  const form = document.getElementById('f');
  const q = document.getElementById('q');
  const send = document.getElementById('send');
  const history = [];

  function add(who, text, cls) {
    const m = document.createElement('div');
    m.className = 'msg ' + who;
    const label = document.createElement('div');
    label.className = 'who';
    label.textContent = who === 'user' ? 'You' : 'Klarra';
    const b = document.createElement('div');
    b.className = 'bubble' + (cls ? ' ' + cls : '');
    b.textContent = text;
    m.appendChild(label); m.appendChild(b);
    log.appendChild(m);
    log.scrollTop = log.scrollHeight;
    return b;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = q.value.trim();
    if (!text) return;
    q.value = '';
    send.disabled = true;
    add('user', text);
    history.push({ role: 'user', content: text });
    const thinking = add('klarra', 'thinking…', 'thinking');

    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data = await r.json();
      if (data.error) {
        thinking.textContent = 'Error: ' + data.error;
        thinking.classList.remove('thinking');
      } else {
        thinking.textContent = data.reply;
        thinking.classList.remove('thinking');
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      thinking.textContent = 'Network error. Try again.';
      thinking.classList.remove('thinking');
    } finally {
      send.disabled = false;
      q.focus();
    }
  });
  q.focus();
</script>
</body>
</html>
